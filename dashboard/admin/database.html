<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squeeze Admin | Database Editor</title>
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      .editor-container { width: 100%; height: calc(100vh - 280px); display: flex; flex-direction: column; }
      #jsonEditor { flex: 1; width: 100%; background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 1rem; font-family: monospace; font-size: 13px; line-height: 1.5; resize: none; outline: none; transition: border-color 0.2s; white-space: pre; overflow: auto; }
      #jsonEditor:focus { border-color: var(--accent-teal); }
      .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 8px; font-weight: 500; color: white; opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 9999; }
      .toast.success { background: var(--accent-green); }
      .toast.error { background: var(--accent-rose); }
      .toast.show { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body>
    <div id="protectedContent">
      <header class="site-header">
        <div class="header-content">
          <div class="header-left">
            <div class="header-title-wrapper" style="display: flex; align-items: center; margin-bottom: 0.25rem;">
              <img src="/logo-icon.png" alt="Squeeze Logo" class="site-logo" />
              <h1 style="margin-bottom: 0;">Admin <span class="accent">Dashboard</span></h1>
            </div>
            <p class="subtitle" style="margin-top: 0;">Squeeze Data Management</p>
          </div>
          <div class="header-right">
            <nav class="nav-links" style="display: flex; gap: 1.5rem; align-items: center;">
              <a href="/" class="nav-link" style="opacity: 0.6; margin-right: 1rem;">&larr; Public Site</a>
              <a href="/admin/" class="nav-link">Overview</a>
              <a href="/admin/properties.html" class="nav-link">Properties</a>
              <a href="/admin/database.html" class="nav-link" style="color: var(--accent-teal); font-weight: bold;">Database</a>
              <a href="/admin/logs.html" class="nav-link">Logs</a>
            </nav>
          </div>
        </div>
      </header>

      <main>
        <section class="editor-section" style="margin-top: 1rem;">
          <div class="table-header" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem;">
            <div>
              <h2>Property Database Editor</h2>
              <p class="subtitle" style="margin-top: 0;">Directly edit property JSON records stored in Cloudflare D1.</p>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <div style="display: flex; gap: 0.5rem; align-items: center;">
                <input type="text" id="pinInput" placeholder="Enter Property PIN" style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: var(--bg-elevated); color: var(--text-primary); outline: none;" />
                <button id="loadBtn" class="btn btn-secondary">Load</button>
              </div>
              <button id="saveBtn" class="btn" disabled>Save Changes</button>
            </div>
          </div>
          
          <div class="editor-container">
            <textarea id="jsonEditor" spellcheck="false" disabled>Enter a PIN above and click Load to edit a property.</textarea>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const pinInput = document.getElementById('pinInput');
      const loadBtn = document.getElementById('loadBtn');
      const editor = document.getElementById('jsonEditor');
      const saveBtn = document.getElementById('saveBtn');
      const toast = document.getElementById('toast');

      let currentPin = null;

      function showToast(msg, type = 'success') {
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
      }

      loadBtn.addEventListener('click', async () => {
        const pin = pinInput.value.trim();
        if (!pin) {
          showToast('Please enter a PIN', 'error');
          return;
        }

        try {
          loadBtn.disabled = true;
          saveBtn.disabled = true;
          editor.disabled = true;
          editor.value = 'Loading...';
          
          const res = await fetch('/api/admin/data?pin=' + encodeURIComponent(pin) + '&t=' + Date.now());
          
          if (!res.ok) {
            if (res.status === 404) throw new Error('Property not found in database.');
            throw new Error('Failed to load data');
          }
          
          const data = await res.json();
          if (data.property) {
            currentPin = pin;
            editor.value = JSON.stringify(data.property, null, 2);
            editor.disabled = false;
            saveBtn.disabled = false;
          } else {
             throw new Error('Invalid response from server.');
          }
        } catch (err) {
          console.error(err);
          editor.value = err.message || 'Error loading data.';
          currentPin = null;
        } finally {
          loadBtn.disabled = false;
        }
      });

      saveBtn.addEventListener('click', async () => {
        if (!currentPin) return;

        try {
          const content = editor.value;
          const parsed = JSON.parse(content);
          
          if (!parsed.pin) {
            throw new Error('Invalid JSON: Property must have a "pin" field.');
          }
          if (parsed.pin !== currentPin) {
             throw new Error(`PIN mismatch. You loaded ${currentPin} but JSON has ${parsed.pin}. Changing PINs is not supported here.`);
          }

          saveBtn.disabled = true;
          saveBtn.textContent = 'Saving...';

          const res = await fetch('/api/admin/data', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ property: parsed })
          });

          if (!res.ok) {
            const errData = await res.json();
            throw new Error(errData.error || 'Failed to save');
          }

          showToast('Property saved successfully!');
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save Changes';
        }
      });

      // Handle tab key in textarea
      editor.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = this.selectionStart;
          const end = this.selectionEnd;
          this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
          this.selectionStart = this.selectionEnd = start + 2;
        }
      });
    </script>
  </body>
</html>
